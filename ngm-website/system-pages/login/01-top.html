<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════
   LOGIN HERO — self-contained (tokens + hero styles)
   NOTE: this file renders the hero on its own for preview. On the
   live site the SPLIT (hero on the left half, form pushed to the
   right) is driven by global-css/global.css, scoped to
   body.ngm-login-page. Use the slim version (01-top.slim.html)
   once global.css is live.
══════════════════════════════════════════════════════════ */
:root{
  --ngm-sage-dk:#3E5538; --ngm-rose:#B87260; --ngm-cream:#FAF7F2;
  --ngm-serif:"Cormorant Garamond",Georgia,serif;
  --ngm-sans:"DM Sans",system-ui,sans-serif;
}
.ngm *,.ngm *::before,.ngm *::after{box-sizing:border-box;margin:0;padding:0;}
.ngm-login-hero{
  position:relative;overflow:hidden;
  background:radial-gradient(120% 90% at 15% 0%,#4a6342 0%,var(--ngm-sage-dk) 55%,#33472e 100%);
  color:var(--ngm-cream);padding:72px clamp(24px,5vw,68px);
}
.ngm-login-hero::before{content:"";position:absolute;inset:0;opacity:.10;pointer-events:none;
  background-image:radial-gradient(circle at 1px 1px,#fff 1.2px,transparent 0);background-size:26px 26px;}
.ngm-lh-glow{position:absolute;width:520px;height:520px;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(184,114,96,.30),transparent 62%);right:-160px;top:-120px;}
.ngm-login-hero-inner{position:relative;max-width:440px;}
.ngm-login-mark{display:block;width:52px;height:57px;margin-bottom:30px;}
.ngm-lh-eyebrow{display:block;font-family:var(--ngm-sans);font-size:.72rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#D8B7AC;margin-bottom:18px;}
.ngm-lh-title{font-family:var(--ngm-serif);font-weight:500;font-size:clamp(2.3rem,3.6vw,3.4rem);line-height:1.08;color:var(--ngm-cream);margin-bottom:20px;}
.ngm-lh-title em{font-style:italic;color:#E7C0B4;}
.ngm-lh-sub{font-family:var(--ngm-sans);font-size:1.04rem;line-height:1.75;color:rgba(250,247,242,.82);margin-bottom:38px;max-width:400px;}
.ngm-lh-list{list-style:none;display:flex;flex-direction:column;gap:16px;}
.ngm-lh-list li{display:flex;align-items:center;gap:14px;font-family:var(--ngm-sans);font-size:.98rem;color:rgba(250,247,242,.92);}
.ngm-lh-tick{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(231,192,180,.5);display:flex;align-items:center;justify-content:center;}
.ngm-lh-tick svg{width:13px;height:13px;fill:none;stroke:#E7C0B4;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}
</style>

<div class="ngm">
  <section class="ngm-login-hero">
    <span class="ngm-lh-glow"></span>
    <div class="ngm-login-hero-inner">
      <!-- Needle-mark (Minnesota outline + needle, matching the header logo) -->
      <svg class="ngm-login-mark" viewBox="0 0 30 33" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M28.5547 7.44547C26.2681 9.13737 25.721 5.92628 22.5099 6.92791C19.2989 7.92953 17.5135 3.98848 15.3588 4.91173C8.69503 7.76718 8.3302 -0.592457 10.5295 0.689564C12.7288 1.97158 9.43716 5.04174 3.59451 2.8711C-2.24814 0.700455 1.98638 9.17239 2.77963 12.1143C3.57287 15.0563 4.59607 17.9819 3.34335 18.7705C2.09063 19.5592 1.98055 21.0184 3.59389 21.9567C5.20724 22.8949 3.06149 29.717 3.75048 31.2627C4.43948 32.8085 22.5099 32.8715 23.2929 31.2627C25.0116 27.7311 18.3781 28.5168 17.9688 25.4583C17.7861 24.0923 18.5862 23.3231 18.4073 21.9567C18.292 21.0757 17.6044 20.6564 17.7496 19.78C17.9432 18.6113 19.5185 18.7835 19.9106 17.6664C20.262 16.6651 19.3568 15.9495 19.7226 14.9535C20.198 13.6594 21.7581 14.3958 22.5099 12.8083C23.2618 11.2209 23.9468 10.4799 26.2681 9.77992" stroke="#E7C0B4" stroke-width="1.10903" stroke-linecap="round"/>
        <path d="M20.9651 5.25056L4.17261 31.89L18.68 3.92169C18.9674 3.36764 19.7428 3.22016 20.3898 3.59646C21.0369 3.97276 21.2977 4.72284 20.9651 5.25056ZM19.3148 4.29165L18.1796 6.2722C18.0453 6.50659 18.1635 6.82871 18.4437 6.99168C18.724 7.15465 19.0601 7.09675 19.1944 6.86236L20.3296 4.88181C20.464 4.64742 20.3457 4.3253 20.0655 4.16233C19.7852 3.99936 19.4492 4.05726 19.3148 4.29165Z" fill="#FAF7F2"/>
      </svg>
      <span class="ngm-lh-eyebrow">Member Login</span>
      <h1 class="ngm-lh-title">Welcome back, <br><em>stitchers</em></h1>
      <p class="ngm-lh-sub">Sign in to your Needlework Guild account to register for meetings and
        events, browse the member directory, and open members-only resources.</p>
      <ul class="ngm-lh-list">
        <li><span class="ngm-lh-tick"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12l4 4L19 6"/></svg></span> Register for monthly meetings &amp; events</li>
        <li><span class="ngm-lh-tick"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12l4 4L19 6"/></svg></span> Browse the member directory</li>
        <li><span class="ngm-lh-tick"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12l4 4L19 6"/></svg></span> Members-only patterns &amp; resources</li>
      </ul>
    </div>
  </section>
</div>
<!-- The native WA login form gadget is added next (02-wa-gadget.txt),
     then 03-bottom.html follows — both sit in the right half via Global CSS. -->
<script>
  /* Marks this as the login page so the Global CSS turns on the split
     layout and shows the login form EXPANDED (a card in the right
     column) instead of hidden behind a "Log in" dropdown. */
  document.body.classList.add('ngm-login-page');
</script>
