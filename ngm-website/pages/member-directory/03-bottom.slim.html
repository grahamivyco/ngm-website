<!-- Canonical page markup — this is the file to edit and to paste into the WA Custom-HTML gadget. Styling lives in global-css/global.css (served via jsDelivr; must be live in WA first). There is no separate self-contained version. -->
<div class="ngm ngm-dir-foot">
  <div class="ngm-dir-foot-inner">
    <div class="ngm-dir-foot-text">
      <span class="ngm-eyebrow">Your listing</span>
      <h2 class="ngm-h2">Keep your listing <em>current</em></h2>
      <p>Your directory entry comes from your own profile &mdash; update it any time to change what other members see.</p>
    </div>
    <!-- these /Sys/Profile paths resolve to the logged-in member; never add ?memberId -->
    <div class="ngm-dir-foot-btns">
      <a class="ngm-btn ngm-btn-green" href="/Sys/Profile">Edit your profile</a>
      <a class="ngm-btn ngm-btn-outline" href="/Sys/Profile/Privacy">Privacy settings</a>
    </div>
  </div>
</div>
