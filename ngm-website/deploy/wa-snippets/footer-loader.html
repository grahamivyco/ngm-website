<!--
  ┌────────────────────────────────────────────────────────────────┐
  │  NGM FOOTER LOADER — live-loaded from GitHub via jsDelivr        │
  │                                                                  │
  │  WHERE THIS GOES:                                                │
  │  Paste into the BOTTOM Custom HTML gadget of your WA site        │
  │  template (the one that used to hold the full footer). Replace   │
  │  whatever footer markup is there now with this loader.           │
  │                                                                  │
  │  WHAT IT DOES:                                                   │
  │  Fetches ngm-website/layout/footer/01-top.html from GitHub and   │
  │  injects it. Edit the footer in the repo and the live site       │
  │  updates — no re-pasting.                                        │
  └────────────────────────────────────────────────────────────────┘
-->
<div id="ngm-footer-mount"></div>
<script>
(function(){
  if(window._ngmFooterLoader)return; window._ngmFooterLoader=true;
  var SRC='https://cdn.jsdelivr.net/gh/grahamivyco/ngm-website@main/ngm-website/layout/footer/01-top.html';
  fetch(SRC).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.text();
  }).then(function(html){
    var mount=document.getElementById('ngm-footer-mount');
    if(!mount)return;
    mount.innerHTML=html;
    /* Browsers parse injected <style> but will NOT run injected <script>.
       Re-create each script element so the footer's JS actually executes. */
    mount.querySelectorAll('script').forEach(function(old){
      var s=document.createElement('script');
      if(old.src){s.src=old.src;}else{s.textContent=old.textContent;}
      document.body.appendChild(s);
      old.parentNode.removeChild(old);
    });
  }).catch(function(e){
    if(window.console&&console.error)console.error('NGM footer failed to load:',e);
  });
})();
</script>
