<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════
   SHARED BASE SYSTEM (copied from the homepage gadget so this
   page is self-contained). Tokens, typography, layout, buttons,
   arrow links, badges — including the button font + pill-outline
   fixes that beat the WA theme.
══════════════════════════════════════════════════════════ */
/* ── 1. DESIGN TOKENS ───────────────────────────────────── */
:root {
  --ngm-sage:      #5C7A52;
  --ngm-sage-dk:   #3E5538;
  --ngm-sage-lt:   #EEF3EC;
  --ngm-rose:      #B87260;
  --ngm-rose-lt:   #F5EBE7;
  --ngm-rose-dk:   #9A5C4A;
  --ngm-cream:     #FAF7F2;
  --ngm-linen:     #F0EAE0;
  --ngm-linen-dk:  #E5DDD0;
  --ngm-charcoal:  #242424;
  --ngm-gray:      #656565;
  --ngm-gray-lt:   #9A9A9A;
  --ngm-border:    #DDD5C8;
  --ngm-serif: "Cormorant Garamond", Georgia, serif;
  --ngm-sans:  "DM Sans", system-ui, sans-serif;
  --ngm-radius:    14px;
  --ngm-radius-lg: 20px;
  --ngm-sh:   0 2px 12px rgba(0,0,0,.06);
  --ngm-shm:  0 8px 32px rgba(0,0,0,.10);
  --ngm-shx:  0 20px 60px rgba(0,0,0,.14);
}
/* ── 2. SCOPE RESET ─────────────────────────────────────── */
.ngm *,
.ngm *::before,
.ngm *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
/* ── 3. TYPOGRAPHY SYSTEM ───────────────────────────────── */
.ngm-eyebrow {
  display: block;
  font-family: var(--ngm-sans);
  font-size: .7rem;
  font-weight: 500;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--ngm-sage);
  margin-bottom: 10px;
}
.ngm-h1 {
  font-family: var(--ngm-serif) !important;
  font-size: clamp(2.8rem, 4.5vw, 4.2rem);
  font-weight: 400;
  line-height: 1.08;
  color: var(--ngm-charcoal);
  text-transform: none !important;
  margin-bottom: 20px;
}
.ngm-h2 {
  font-family: var(--ngm-serif) !important;
  font-size: clamp(2rem, 3.5vw, 2.8rem);
  font-weight: 400;
  line-height: 1.12;
  color: var(--ngm-charcoal);
  text-transform: none !important;
  margin-bottom: 14px;
}
.ngm-h2-dark {
  font-family: var(--ngm-serif) !important;
  font-size: clamp(2.2rem, 3.2vw, 3.2rem);
  font-weight: 400;
  line-height: 1.1;
  color: #fff;
  text-transform: none !important;
  margin-bottom: 16px;
}
.ngm-h1 em,
.ngm-h2 em,
.ngm-h2-dark em {
  font-family: var(--ngm-serif) !important;
  font-size: inherit;
  font-weight: inherit;
  line-height: inherit;
  font-style: italic;
  color: var(--ngm-rose) !important;
}
.ngm-lead {
  font-family: var(--ngm-sans);
  font-size: 1.0625rem;
  color: var(--ngm-gray);
  line-height: 1.8;
  max-width: 560px;
  margin-bottom: 36px;
}
/* ── 4. LAYOUT HELPERS ──────────────────────────────────── */
.ngm-sec {
  padding: 88px 48px;
}
.ngm-sec-linen { background: var(--ngm-linen); }
.ngm-sec-cream { background: var(--ngm-cream); }
.ngm-sec-white { background: #fff; }
.ngm-con {
  max-width: 1080px;
  margin: 0 auto;
}
/* ── 5. BUTTONS ─────────────────────────────────────────────
   FONT FIX: WA's theme applies its own font to every anchor via
   high-specificity rules like  body A:not(.stylizedButton) {…}.
   A plain `.ngm-btn { font-family }` loses to that, so the pill
   buttons (Join, Get directions, etc.) rendered in the theme's
   font instead of DM Sans. We mirror WA's specificity by also
   declaring the rule with a `body` prefix + !important on the
   font properties, so our font wins. (Same high-specificity
   override pattern used for the WA events gadget in section 12.)
   The arrow links already won this fight; this brings the pills
   in line with the page's type system.
────────────────────────────────────────────────────────── */
.ngm-btn,
body a.ngm-btn,
body a.ngm-btn:link,
body a.ngm-btn:visited {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-family: var(--ngm-sans) !important;
  font-size: .9rem !important;
  font-weight: 500 !important;
  letter-spacing: normal !important;
  text-transform: none !important;
  border-radius: 100px;
  padding: 12px 26px;
  cursor: pointer;
  text-decoration: none !important;
  border: 1.5px solid transparent;
  transition: background .2s, transform .18s, box-shadow .18s, color .2s;
  line-height: 1;
}
.ngm-btn-sm,
body a.ngm-btn-sm { padding: 9px 20px; font-size: .82rem !important; }
.ngm-btn-green  { background: var(--ngm-sage-dk); color: #fff !important; border-color: var(--ngm-sage-dk); }
.ngm-btn-green:hover  { background: var(--ngm-sage); border-color: var(--ngm-sage); transform: translateY(-1px); box-shadow: 0 5px 16px rgba(62,85,56,.25); }
.ngm-btn-rose   { background: var(--ngm-rose);    color: #fff !important; border-color: var(--ngm-rose); }
.ngm-btn-rose:hover   { background: var(--ngm-rose-dk); border-color: var(--ngm-rose-dk); }
.ngm-btn-outline,
body a.ngm-btn-outline { background: transparent; color: var(--ngm-sage-dk) !important; border: 1.5px solid var(--ngm-sage-dk) !important; }
.ngm-btn-outline:hover,
body a.ngm-btn-outline:hover { background: var(--ngm-sage-dk) !important; color: #fff !important; }
.ngm-btn-outline-rose,
body a.ngm-btn-outline-rose { background: transparent; color: var(--ngm-rose) !important; border: 1.5px solid var(--ngm-rose) !important; }
.ngm-btn-outline-rose:hover,
body a.ngm-btn-outline-rose:hover { background: var(--ngm-rose) !important; color: #fff !important; }
.ngm-btn-white  { background: #fff; color: var(--ngm-charcoal) !important; border-color: #fff; }
.ngm-btn-white:hover  { background: var(--ngm-cream); }
/* Stops a button stretching to fill a flex/grid column on desktop.
   Used on the Retreat button, which sits in a flex-column. */
.ngm-btn-fit { align-self: flex-start; }
/* ── 6. ARROW LINK ──────────────────────────────────────── */
.ngm-arrow-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--ngm-sans);
  font-size: .9rem;
  color: var(--ngm-sage-dk) !important;
  text-decoration: none !important;
  border-bottom: 1px solid rgba(62,85,56,.3);
  padding-bottom: 2px;
  transition: gap .18s, border-color .18s;
}
.ngm-arrow-link:hover {
  gap: 10px;
  border-color: var(--ngm-sage-dk);
}
.ngm-arrow-link-sm { font-size: .8rem; }
/* ── 7. FORMAT BADGES ───────────────────────────────────── */
.ngm-badge {
  display: inline-flex;
  align-items: center;
  font-family: var(--ngm-sans);
  font-size: .68rem;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 100px;
  letter-spacing: .04em;
}
.ngm-badge-hybrid  { background: #E3EFEF; color: #2A5A5A; }
.ngm-badge-person  { background: var(--ngm-rose-lt); color: #7A3E2E; }
.ngm-badge-zoom    { background: #EEEEFF; color: #3A46AF; }
.ngm-badge-virtual { background: #F2EEF8; color: #5A3A8A; }
/* ══════════════════════════════════════════════════════════
   MEMBER-DIRECTORY-SPECIFIC STYLES (.ngm-dir-*)
   Intro band that sits ABOVE the native WA Member Directory
   gadget. Keep it to the intro — the searchable list itself is
   the WA gadget that follows in the next Custom HTML slot.
══════════════════════════════════════════════════════════ */
.ngm-dir-hero {
  background: var(--ngm-cream);
  padding: 80px 48px 68px;
  border-bottom: 1px solid var(--ngm-border);
}
.ngm-dir-hero-inner {
  max-width: 1080px;
  margin: 0 auto;
}
.ngm-dir-hero .ngm-lead {
  margin-bottom: 0;
  max-width: 620px;
}
/* Small "members only" lock cue next to the eyebrow. */
.ngm-dir-eyebrow-row {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.ngm-dir-eyebrow-row .ngm-eyebrow { margin-bottom: 0; }
.ngm-dir-eyebrow-row svg {
  width: 15px;
  height: 15px;
  color: var(--ngm-sage);
  flex-shrink: 0;
}
@media (max-width: 900px) {
  .ngm-dir-hero { padding: 56px 28px 48px; }
  .ngm-dir-hero .ngm-lead { max-width: 100%; }
}
@media (max-width: 560px) {
  .ngm-dir-hero { padding: 44px 18px 38px; }
}
/* ══════════════════════════════════════════════════════════
   WA GAP-KILLING (sections 19 + 20 from homepage) — confirmed
   classes from Inspect. Safe to include again; identical rules
   in the global CSS just no-op. Closes the header→hero gap and
   the gaps between the stacked gadgets in this sandwich too.
══════════════════════════════════════════════════════════ */
body .WaGadgetCustomHtml,
body .WaGadgetCustomHtml .gadgetStyleBody {
  margin: 0 !important;
  padding: 0 !important;
}
body [class^="WaGadget"],
body .WaGadgetFirst {
  margin: 0 !important;
}
body [class*="WaCustomLayoutContainer"] {
  margin-bottom: 0 !important;
}
body .WaPlaceHolderContent > div,
body .WaPlaceHolderContent1 > div,
body .WaPlaceHolderContent2 > div,
body .WaPlaceHolderContent3 > div,
body .WaPlaceHolderContent4 > div {
  padding-top: 0 !important;
  padding-bottom: 0 !important;
}
body .WaPlaceHolder > div,
body .WaPlaceHolderWide > div {
  padding-top: 0 !important;
  padding-bottom: 0 !important;
  margin-top: 0 !important;
  margin-bottom: 0 !important;
}
</style>
<div class="ngm ngm-dir-hero">
  <div class="ngm-dir-hero-inner">
    <span class="ngm-dir-eyebrow-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span class="ngm-eyebrow">Members only</span>
    </span>
    <h1 class="ngm-h1">Member <em>directory</em></h1>
    <p class="ngm-lead">A searchable listing of Guild members&rsquo; names and contact information, available to logged-in members. Use it to connect with other stitchers &mdash; look up someone you met at a Stitch-In, or reach out to share a pattern between meetings.</p>
  </div>
</div>
